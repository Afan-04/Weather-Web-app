<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather app</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- SEARCH BAR -->
        <div class="search">
            <input id="city" type="text" placeholder="Enter city name" spellcheck="false">
            <button id="btn">
                <img src="search-icon.png" alt="search" class="search-icon">
            </button>
        </div>
        <!-- DESIGN CONTENT -->
        <div class="content">
            <h2 class="title">Weather Today</h2>
            <p class="subtitle">New Delhi</p>
        </div>
        
        <div class="bottom">
            <span class="temp"> <img src="weather.png" alt="" class="w-icon">22°C</span>
            <span class="wind">  <img src="wind.png" alt="" class="wind-icon">65 km/h</span>
            <span class="feels-like">  <img src="feels-like.png" alt="" class="feels-like-icon">Feels 24°C</span>
        </div>
        <!-- END DESIGN CONTENT -->

    </div>
 

    <script src="script.js"></script>


</body>

</html>
